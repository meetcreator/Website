<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | TINMCO</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="/favicon.ico" sizes="any">
</head>

<body
    style="display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; background-color: var(--bg-main); color: var(--text-primary); margin: 0;">
    <div class="container">
        <h1 style="color: var(--accent-primary); font-size: 6rem; margin-bottom: 24px;">404</h1>
        <h2>Page Not Found</h2>
        <p style="margin: 24px auto 48px; max-width: 400px; color: var(--text-secondary);">The page you are looking for
            doesn't exist or has been moved. Check the URL or head back home.</p>
        <a href="/" class="btn">Return Home</a>
    </div>
</body>

</html>
