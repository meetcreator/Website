services:
  - type: web
    name: business-backend
    env: node
    plan: free
    rootDir: business/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/src/main
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: JWT_SECRET
        value: change-this-to-a-secure-random-string-in-render-dashboard
      - key: FRONTEND_URL
        value: https://tinmco.com
