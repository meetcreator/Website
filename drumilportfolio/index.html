<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=/portfolio.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drumil's Portfolio</title>
  <style>
    :root {
      --bg: #050a14;
      --primary: #f59e0b;
      --text: rgba(255,255,255,0.85);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 1rem;
      flex-direction: column;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(245,158,11,0.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 0.9rem; color: rgba(255,255,255,0.4); }
    a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Redirecting to portfolio&hellip; <a href="/portfolio.html">Click here if not redirected.</a></p>
  <script>window.location.replace('/portfolio.html');</script>
</body>
</html>
